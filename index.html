    <title>Vito Oyun İndir</title>
    <style>
        /* Tüm sayfa boşluklarını sıfırla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ana gövdede taşmaları gizle, sadece iframe'in içinde kaydırma olacak */
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000; /* Sayfa arka planı siyah */
        }

        /* Iframe: Ekranı tamamen kaplasın */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            
            /* --- DARK MODE SCROLLBAR (KAYDIRMA ÇUBUĞU) AYARLARI --- */

            /* Firefox için ayar */
            scrollbar-width: thin; /* İnce çubuk */
            scrollbar-color: #444 #000; /* Çubuk rengi ve Arka plan rengi */
        }

        /* Chrome, Safari, Edge için ayarlar */
        iframe::-webkit-scrollbar {
            width: 12px; /* Çubuğun genişliği */
            background-color: #000; /* Çubuğun arka planı (rayı) */
        }

        iframe::-webkit-scrollbar-track {
            background: #1a1a1a; /* Rayın rengi, biraz daha koyu gri */
        }

        iframe::-webkit-scrollbar-thumb {
            background-color: #444; /* Hareket eden kaydırma parçasının rengi (koyu gri) */
            border-radius: 6px; /* Köşelerini yuvarlatır, daha modern durur */
            border: 3px solid #1a1a1a; /* Çubuğun etrafına boşluk hissi veren kenarlık */
        }

        /* Üzerine gelince rengi biraz açılsın (isteğe bağlı efekt) */
        iframe::-webkit-scrollbar-thumb:hover {
            background-color: #555;
        }
    </style>
